<!DOCTYPE html>
<html>
    <head>
        <title>Digital clock</title>
    </head>
    <style>
       body{
        font-family: "Text New Roman";
        background: #222;
        justify-content: center;
        align-items: center;
        display: flex;
        color: white;
        height: 100vh;
       }
       .clock{
        background: #222;
        padding: 30px 50px;
        box-shadow: 0px 0px 20px cyan;
        border-radius: 10px;
        font-size: 40px;
        letter-spacing: 3px;
       }
       h2{
        text-align: center;
        font-size: large;
       }
       </style>
       <script>
        function showtime(){
            let date=new Date();
            let h=date.getHours();
            let m=date.getMinutes();
            let s=date.getSeconds();
            h=(h<10)?"0"+h:h;
            m=(m<10)?"0"+m:m;
            s=(s<10)?"0"+s:s;
            let time=h+":"+m+":"+s;
            document.getElementById("clock").innerHTML=time;
        }
        setInterval(showtime,1000);
        </script>
        <body onload="showtime()">
            <div>
                <h2 align="center">Digital clock</h2>
                <div class="clock" id="clock"></div>
            </div>
        </body>
</html>
